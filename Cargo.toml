[package]
name = "bevy-llm"
version = "0.1.0"
edition = "2024"

[workspace]
members = [".", "examples/*"]

[workspace.dependencies]
rand = "0.10.1"
serde = "1.0.228"

[workspace.dependencies.bevy]
git = "https://github.com/bevyengine/bevy.git"
rev = "638c5dd29778c9ea718d44996b4832ed600c0169" # 2026/05/01
default-features = false

[dependencies]
rig-core = "0.36.0"
tokio = { version = "1.52.1", features = ["rt-multi-thread"] }
bevy = { workspace = true }
serde = { workspace = true }

[dev-dependencies]
rand = { workspace = true }
